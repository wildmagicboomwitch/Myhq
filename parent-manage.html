<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Manage — Parent HQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style id="manage-styles">
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#080c18;--surface:#0d1220;--card:#131929;--card2:#1a2235;--border:rgba(255,255,255,0.07);--accent:#6366f1;--accent2:#34d399;--danger:#f87171;--warning:#fbbf24;--success:#4ade80;--elder:#e94560;--younger:#c084fc;--text:#f1f5f9;--text-muted:#64748b;--radius:18px;--radius-sm:10px;--font-main:'Nunito',sans-serif;--font-disp:'Fredoka One',cursive;}
html,body{min-height:100vh;font-family:var(--font-main);background:var(--bg);color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 50% 30% at 60% 0%,rgba(99,102,241,.08) 0%,transparent 70%),var(--bg);pointer-events:none;}
#app{position:relative;z-index:1;max-width:640px;margin:0 auto;}
.hidden{display:none!important;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(12px);}
.back-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text-muted);font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font-main);transition:all .2s;flex-shrink:0;}
.back-btn:hover{color:var(--text);border-color:var(--accent);}
.topbar-title{font-family:var(--font-disp);font-size:20px;color:var(--accent);flex:1;}

/* TAB STRIP */
.tab-strip{display:flex;gap:4px;overflow-x:auto;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg);}
.tab-strip::-webkit-scrollbar{display:none;}
.ts-tab{flex-shrink:0;background:var(--card);border:2px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:800;cursor:pointer;font-family:var(--font-main);color:var(--text-muted);transition:all .2s;white-space:nowrap;}
.ts-tab:hover{border-color:var(--accent);color:var(--text);}
.ts-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* PAGE BODY */
.page{padding:16px 16px 100px;display:flex;flex-direction:column;gap:18px;}

/* SHARED COMPONENTS */
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.section-title{font-family:var(--font-disp);font-size:18px;color:var(--accent);margin-bottom:14px;}
.section-sub{font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:12px;line-height:1.5;}
.f-row{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.f-row.two{flex-direction:row;gap:10px;}.f-row.two>*{flex:1;}
.f-label{font-size:11px;font-weight:900;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;}
.f-input,.f-select{width:100%;background:rgba(255,255,255,.04);border:2px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:15px;color:var(--text);font-family:var(--font-main);outline:none;transition:border-color .2s;}
.f-input:focus,.f-select:focus{border-color:var(--accent);}
.f-select option{background:var(--surface);}
.save-btn{width:100%;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:900;color:#fff;cursor:pointer;font-family:var(--font-main);transition:all .2s;margin-top:4px;}
.save-btn:hover{transform:translateY(-1px);}
.toggle-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.toggle-row:last-child{border-bottom:none;}
.toggle-info{flex:1;}
.toggle-label{font-size:13px;font-weight:700;}
.toggle-sub{font-size:11px;font-weight:600;color:var(--text-muted);margin-top:1px;}
.toggle-sw{width:40px;height:22px;background:rgba(255,255,255,.1);border-radius:20px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
.toggle-sw.on{background:var(--accent);}
.toggle-sw::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s;}
.toggle-sw.on::after{transform:translateX(18px);}

/* CHORES */
.emoji-strip{display:flex;flex-wrap:wrap;gap:6px;}
.e-btn{background:rgba(255,255,255,.05);border:2px solid transparent;border-radius:8px;padding:6px 8px;font-size:20px;cursor:pointer;transition:all .2s;}
.e-btn:hover,.e-btn.sel{border-color:var(--accent);background:rgba(99,102,241,.1);}
.add-form{background:var(--card);border:2px solid rgba(99,102,241,.2);border-radius:var(--radius);padding:18px;display:none;}
.add-form.open{display:block;}
.form-title{font-family:var(--font-disp);font-size:18px;color:var(--accent);margin-bottom:14px;}
.assign-pills{display:flex;gap:8px;}
.assign-pill{flex:1;background:rgba(255,255,255,.05);border:2px solid var(--border);border-radius:20px;padding:8px 10px;font-size:12px;font-weight:800;cursor:pointer;font-family:var(--font-main);color:var(--text-muted);text-align:center;transition:all .2s;}
.assign-pill.active.elder{border-color:var(--elder);background:rgba(233,69,96,.12);color:var(--elder);}
.assign-pill.active.younger{border-color:var(--younger);background:rgba(192,132,252,.12);color:var(--younger);}
.assign-pill.active.both{border-color:var(--accent2);background:rgba(52,211,153,.12);color:var(--accent2);}
.days-row{display:flex;gap:6px;flex-wrap:wrap;}
.day-btn{background:rgba(255,255,255,.05);border:2px solid var(--border);border-radius:20px;padding:6px 10px;font-size:12px;font-weight:800;cursor:pointer;font-family:var(--font-main);color:var(--text-muted);transition:all .2s;}
.day-btn.active{border-color:var(--accent);background:rgba(99,102,241,.12);color:var(--text);}
.form-btns{display:flex;gap:10px;margin-top:12px;}
.btn-save{flex:1;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:12px;font-size:15px;font-weight:900;color:#fff;cursor:pointer;font-family:var(--font-main);}
.btn-cancel{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 18px;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;font-family:var(--font-main);}
.presets-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.presets-strip::-webkit-scrollbar{display:none;}
.preset-chip{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:800;color:var(--text-muted);cursor:pointer;font-family:var(--font-main);transition:all .2s;white-space:nowrap;}
.preset-chip:hover{border-color:var(--accent);color:var(--text);}

/* CHORE + REWARD CARDS */
.item-list{display:flex;flex-direction:column;gap:8px;}
.item-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;}
.item-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ic,var(--accent));}
.ic-emoji{font-size:24px;flex-shrink:0;}
.ic-info{flex:1;}
.ic-name{font-size:14px;font-weight:800;margin-bottom:3px;}
.ic-meta{display:flex;gap:6px;flex-wrap:wrap;}
.ic-tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--text-muted);}
.ic-tag.elder{color:var(--elder);background:rgba(233,69,96,.1);}
.ic-tag.younger{color:var(--younger);background:rgba(192,132,252,.1);}
.ic-tag.both{color:var(--accent2);background:rgba(52,211,153,.1);}
.ic-tag.pts{color:var(--warning);}
.ic-tag.bonus{color:var(--warning);background:rgba(251,191,36,.1);}
.ic-del{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px;border-radius:6px;transition:color .2s;flex-shrink:0;}
.ic-del:hover{color:var(--danger);}

/* REWARDS */
.pend-card{background:var(--card);border:2px solid rgba(251,191,36,.2);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.pend-emoji{font-size:24px;flex-shrink:0;}
.pend-name{font-size:13px;font-weight:800;}
.pend-who{font-size:11px;font-weight:700;margin-top:2px;}
.pend-who.elder{color:var(--elder);}.pend-who.younger{color:var(--younger);}
.pend-acts{display:flex;gap:6px;flex-shrink:0;}
.approve-btn{background:var(--success);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:900;color:#052e16;cursor:pointer;font-family:var(--font-main);}
.deny-btn{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:8px;padding:7px 10px;font-size:12px;font-weight:800;color:var(--danger);cursor:pointer;font-family:var(--font-main);}

/* PROFILES */
.profile-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.prof-card{background:var(--card2);border:2px solid var(--border);border-radius:var(--radius-sm);padding:14px;cursor:pointer;transition:all .2s;}
.prof-card.elder{border-color:rgba(233,69,96,.2);}
.prof-card.younger{border-color:rgba(192,132,252,.2);}
.prof-card:hover{transform:scale(1.02);}
.prof-name{font-size:15px;font-weight:900;margin-bottom:4px;}
.prof-name.elder{color:var(--elder);}.prof-name.younger{color:var(--younger);}
.prof-detail{font-size:12px;color:var(--text-muted);font-weight:600;}

/* ROUTINES */
.step-list{display:flex;flex-direction:column;gap:8px;}
.step-item{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;display:flex;align-items:center;gap:10px;}
.step-emoji{font-size:22px;flex-shrink:0;}
.step-name{font-size:14px;font-weight:800;flex:1;}
.step-tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--text-muted);}
.step-del{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px;border-radius:6px;transition:color .2s;}
.step-del:hover{color:var(--danger);}

/* MONITORING */
.today-pills{display:flex;flex-direction:column;gap:8px;}
.today-pill{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:12px;}
.tp-emoji{font-size:26px;flex-shrink:0;}
.tp-info{flex:1;}
.tp-name{font-size:14px;font-weight:800;}
.tp-detail{font-size:12px;font-weight:600;color:var(--text-muted);margin-top:3px;}
.chart-row{display:flex;align-items:center;gap:10px;margin:5px 0;}
.chart-lbl{font-size:11px;font-weight:800;color:var(--text-muted);width:80px;flex-shrink:0;}
.chart-bg{flex:1;background:rgba(255,255,255,.06);border-radius:20px;height:8px;overflow:hidden;}
.chart-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s ease;}
.chart-val{font-size:12px;font-weight:900;color:var(--accent);width:32px;text-align:right;flex-shrink:0;}

/* EMPTY */
.empty-state{text-align:center;padding:28px;color:var(--text-muted);font-size:13px;font-weight:700;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:640px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:90;padding:8px 0 max(8px,env(safe-area-inset-bottom));}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;text-decoration:none;color:var(--text-muted);border:none;background:none;font-family:var(--font-main);transition:color .2s;}
.bnav-item .bn-emoji{font-size:20px;}.bnav-item .bn-label{font-size:9px;font-weight:800;text-transform:uppercase;}
.bnav-item.active{color:var(--accent);}
#tw{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;width:90%;max-width:400px;pointer-events:none;}
@keyframes tIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(8px)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;}}
</style>
</head>
<body>
<div id="app">

<div class="topbar">
  <button class="back-btn" onclick="location.href='parent.html'">← Dashboard</button>
  <div class="topbar-title" id="pageTitle">⚙️ Manage</div>
</div>

<!-- TAB STRIP -->
<div class="tab-strip">
  <button class="ts-tab" data-tab="chores">✅ Chores</button>
  <button class="ts-tab" data-tab="rewards">⭐ Rewards</button>
  <button class="ts-tab" data-tab="routines">🌙 Routines</button>
  <button class="ts-tab" data-tab="monitoring">📊 Monitoring</button>
  <button class="ts-tab" data-tab="profiles">👧 Profiles</button>
  <button class="ts-tab" data-tab="settings">⚙️ Settings</button>
</div>

<main class="page" id="mainPage">
  <!-- Content injected by JS -->
</main>

<nav class="bottom-nav">
  <a class="bnav-item" href="parent.html"><span class="bn-emoji">🏠</span><span class="bn-label">Home</span></a>
  <button class="bnav-item active" onclick="switchTab('chores')"><span class="bn-emoji">✅</span><span class="bn-label">Chores</span></button>
  <button class="bnav-item" onclick="switchTab('rewards')"><span class="bn-emoji">⭐</span><span class="bn-label">Rewards</span></button>
  <button class="bnav-item" onclick="switchTab('settings')"><span class="bn-emoji">⚙️</span><span class="bn-label">Settings</span></button>
</nav>
<div id="tw"></div>
</div>

<script>

/* ============================================================
   MY HQ — CORE LIBRARY  (myhq-core.js)
============================================================ */

const MYHQ = {
  VERSION: '1.0.0',
  PREFIX: 'myhq-',
  PROFILES: { ELDER: 'elder', YOUNGER: 'younger', FAMILY: 'family', PARENT: 'parent' },
  THEMES: {
    DEFAULT_ELDER:   { name: 'Starlight',    bg:'#1a1a2e', surface:'#16213e', card:'#0f3460', accent:'#e94560', accent2:'#533483', text:'#eaeaea', textMuted:'#a0a0b0', star:'#ffd700' },
    DEFAULT_YOUNGER: { name: 'Cotton Candy', bg:'#f8f0ff', surface:'#fff0f8', card:'#ffffff', accent:'#c084fc', accent2:'#fb7185', text:'#2d1b69', textMuted:'#7c3aed',  star:'#fbbf24' },
    CALM:            { name: 'Calm',         bg:'#f0f4f0', surface:'#e8f0e8', card:'#ffffff', accent:'#4ade80', accent2:'#60a5fa', text:'#1a2e1a', textMuted:'#4b7a4b',  star:'#fbbf24' },
    OCEAN:           { name: 'Ocean',        bg:'#0d1b2a', surface:'#1b263b', card:'#415a77', accent:'#00b4d8', accent2:'#90e0ef', text:'#e0fbfc', textMuted:'#a8dadc',  star:'#ffd700' },
    SUNSET:          { name: 'Sunset',       bg:'#fff7ed', surface:'#fef3c7', card:'#ffffff', accent:'#f97316', accent2:'#ec4899', text:'#431407', textMuted:'#92400e',  star:'#fbbf24' },
    NIGHT:           { name: 'Night Sky',    bg:'#0a0a1a', surface:'#111128', card:'#1a1a38', accent:'#818cf8', accent2:'#34d399', text:'#f1f5f9', textMuted:'#94a3b8',  star:'#fbbf24' },
    FOREST:          { name: 'Forest',       bg:'#f0fdf4', surface:'#dcfce7', card:'#ffffff', accent:'#16a34a', accent2:'#65a30d', text:'#14532d', textMuted:'#166534',  star:'#fbbf24' },
    BUBBLEGUM:       { name: 'Bubblegum',    bg:'#fff0f8', surface:'#fce7f3', card:'#ffffff', accent:'#ec4899', accent2:'#a855f7', text:'#500724', textMuted:'#9d174d',  star:'#fbbf24' },
  },
  MOODS: [
    { id:'rad',         emoji:'🤩', label:'Rad!',     color:'#fbbf24' },
    { id:'good',        emoji:'😊', label:'Good',     color:'#4ade80' },
    { id:'okay',        emoji:'😐', label:'Okay',     color:'#60a5fa' },
    { id:'meh',         emoji:'😕', label:'Meh',      color:'#a78bfa' },
    { id:'sad',         emoji:'😢', label:'Sad',      color:'#818cf8' },
    { id:'mad',         emoji:'😠', label:'Mad',      color:'#f87171' },
    { id:'scared',      emoji:'😨', label:'Scared',   color:'#fb923c' },
    { id:'tired',       emoji:'😴', label:'Tired',    color:'#94a3b8' },
    { id:'overwhelmed', emoji:'🤯', label:'Too Much', color:'#e879f9' },
    { id:'silly',       emoji:'🤪', label:'Silly',    color:'#34d399' },
  ],
  ENERGY: [
    { id:1, emoji:'🪫', label:'Empty' },
    { id:2, emoji:'😴', label:'Low' },
    { id:3, emoji:'😐', label:'Okay' },
    { id:4, emoji:'😊', label:'Good' },
    { id:5, emoji:'🚀', label:'Full Power' },
  ],
  MASCOTS: [
    { id:'star',      emoji:'⭐', name:'Star' },
    { id:'moon',      emoji:'🌙', name:'Moon' },
    { id:'sun',       emoji:'☀️',  name:'Sun' },
    { id:'rainbow',   emoji:'🌈', name:'Rainbow' },
    { id:'unicorn',   emoji:'🦄', name:'Unicorn' },
    { id:'dragon',    emoji:'🐉', name:'Dragon' },
    { id:'butterfly', emoji:'🦋', name:'Butterfly' },
    { id:'cat',       emoji:'🐱', name:'Cat' },
    { id:'fox',       emoji:'🦊', name:'Fox' },
    { id:'owl',       emoji:'🦉', name:'Owl' },
    { id:'penguin',   emoji:'🐧', name:'Penguin' },
    { id:'bear',      emoji:'🐻', name:'Bear' },
    { id:'bunny',     emoji:'🐰', name:'Bunny' },
    { id:'panda',     emoji:'🐼', name:'Panda' },
    { id:'frog',      emoji:'🐸', name:'Frog' },
    { id:'axolotl',   emoji:'🦎', name:'Axolotl' },
    { id:'mushroom',  emoji:'🍄', name:'Mushroom' },
    { id:'flower',    emoji:'🌸', name:'Flower' },
    { id:'crystal',   emoji:'💎', name:'Crystal' },
    { id:'robot',     emoji:'🤖', name:'Robot' },
  ]
};

/* --- STORAGE --- */
const Store = {
  get(key, fallback = null) {
    try { const v = localStorage.getItem(MYHQ.PREFIX + key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  },
  set(key, value) {
    try { localStorage.setItem(MYHQ.PREFIX + key, JSON.stringify(value)); return true; }
    catch { return false; }
  },
  remove(key) { localStorage.removeItem(MYHQ.PREFIX + key); },
  getProfile(pid, key, fallback = null) { return this.get(`profile-${pid}-${key}`, fallback); },
  setProfile(pid, key, value)           { return this.set(`profile-${pid}-${key}`, value); },
};

/* --- AUTH --- */
const Auth = {
  SESSION_KEY: 'session',
  SESSION_DURATION: 4 * 60 * 60 * 1000,
  hashPin(pin) {
    let hash = 0;
    const str = pin + 'myhq-salt-2024';
    for (let i = 0; i < str.length; i++) {
      const c = str.charCodeAt(i);
      hash = ((hash << 5) - hash) + c;
      hash = hash & hash;
    }
    return Math.abs(hash).toString(36);
  },
  setPin(profileId, pin) {
    if (!pin || pin.length < 4) return false;
    const profiles = Store.get('auth-profiles', {});
    profiles[profileId] = { pinHash: this.hashPin(pin), hasPin: true, setAt: Date.now() };
    Store.set('auth-profiles', profiles);
    return true;
  },
  hasPin(profileId) { return Store.get('auth-profiles', {})[profileId]?.hasPin === true; },
  verifyPin(profileId, pin) {
    const p = Store.get('auth-profiles', {})[profileId];
    if (!p?.hasPin) return true;
    return p.pinHash === this.hashPin(pin);
  },
  verifyBothParentPins(pinA, pinB) {
    return this.verifyPin('parent-a', pinA) && this.verifyPin('parent-b', pinB);
  },
  startSession(profileId) {
    const session = { profileId, startedAt: Date.now(), expiresAt: Date.now() + this.SESSION_DURATION };
    Store.set(this.SESSION_KEY, session);
    return session;
  },
  getSession() {
    const s = Store.get(this.SESSION_KEY);
    if (!s) return null;
    if (Date.now() > s.expiresAt) { this.endSession(); return null; }
    return s;
  },
  getCurrentProfile() { return this.getSession()?.profileId || null; },
  endSession()        { Store.remove(this.SESSION_KEY); },
  isParent()          { const p = this.getCurrentProfile(); return p === 'parent-a' || p === 'parent-b' || p === 'parent'; },
  getDeviceProfile()  { return Store.get('device-profile', null); },
  setDeviceProfile(profileId) { Store.set('device-profile', profileId); },
};

/* --- PROFILES --- */
const Profiles = {
  DEFAULTS: {
    elder:   { id:'elder',   displayName:'My HQ', age:10, mascot:'star',    theme:'DEFAULT_ELDER',   appName:'My HQ', color:'#e94560', complexity:'full',   setupDone:false, parentControls:{ canChangeComplexity:true,  canChangeTheme:true, canChangeMascot:true, canChangeAppName:true, selfGuidanceMode:false } },
    younger: { id:'younger', displayName:'My HQ', age:7,  mascot:'unicorn', theme:'DEFAULT_YOUNGER', appName:'My HQ', color:'#c084fc', complexity:'simple', setupDone:false, parentControls:{ canChangeComplexity:false, canChangeTheme:true, canChangeMascot:true, canChangeAppName:true, selfGuidanceMode:false } },
    family:  { id:'family',  displayName:'Family Space', theme:'FOREST', setupDone:false },
  },
  get(profileId) {
    const stored   = Store.getProfile(profileId, 'data', null);
    const defaults = this.DEFAULTS[profileId] || {};
    return stored ? { ...defaults, ...stored } : { ...defaults };
  },
  save(profileId, data) {
    const current = this.get(profileId);
    Store.setProfile(profileId, 'data', { ...current, ...data });
  },
  getMascot(profileId) {
    const p = this.get(profileId);
    return MYHQ.MASCOTS.find(m => m.id === p.mascot) || MYHQ.MASCOTS[0];
  },
  getTheme(profileId) {
    const p = this.get(profileId);
    return MYHQ.THEMES[p.theme] || MYHQ.THEMES.CALM;
  },
  applyTheme(profileId) {
    const t    = this.getTheme(profileId);
    const root = document.documentElement;
    root.style.setProperty('--bg',         t.bg);
    root.style.setProperty('--surface',    t.surface);
    root.style.setProperty('--card',       t.card);
    root.style.setProperty('--accent',     t.accent);
    root.style.setProperty('--accent2',    t.accent2);
    root.style.setProperty('--text',       t.text);
    root.style.setProperty('--text-muted', t.textMuted);
    root.style.setProperty('--star',       t.star);
    const isDark = isColorDark(t.bg);
    root.setAttribute('data-theme-mode', isDark ? 'dark' : 'light');
  },
};

function isColorDark(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 < 128;
}

/* --- TOAST --- */
const Toast = {
  _container: null,
  _init() {
    if (this._container) return;
    this._container = document.createElement('div');
    this._container.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:90%;max-width:400px;';
    document.body.appendChild(this._container);
    if (!document.querySelector('#toast-styles')) {
      const s = document.createElement('style');
      s.id = 'toast-styles';
      s.textContent = '@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(10px)}}';
      document.head.appendChild(s);
    }
  },
  show(message, type = 'info', duration = 3000) {
    this._init();
    const icons  = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️', star:'⭐' };
    const colors = { success:'#4ade80', error:'#f87171', warning:'#fbbf24', info:'#60a5fa', star:'#fbbf24' };
    const t = document.createElement('div');
    t.style.cssText = `background:var(--card,#fff);color:var(--text,#000);border:2px solid ${colors[type]||colors.info};border-radius:16px;padding:12px 20px;font-size:15px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);display:flex;align-items:center;gap:8px;pointer-events:all;cursor:pointer;animation:toastIn .3s ease;width:100%;font-family:var(--font-main,sans-serif);`;
    t.innerHTML = `<span>${icons[type]||'💬'}</span><span>${message}</span>`;
    t.addEventListener('click', () => t.remove());
    this._container.appendChild(t);
    setTimeout(() => { t.style.animation = 'toastOut .3s ease forwards'; setTimeout(() => t.remove(), 300); }, duration);
  },
  success(m) { this.show(m, 'success'); },
  error(m)   { this.show(m, 'error'); },
  warning(m) { this.show(m, 'warning'); },
  star(m)    { this.show(m, 'star', 4000); },
};

/* --- CELEBRATE --- */
const Celebrate = {
  fire(intensity = 'medium') {
    const count = { small:40, medium:80, large:150 }[intensity] || 80;
    if (!document.querySelector('#confetti-styles')) {
      const s = document.createElement('style');
      s.id = 'confetti-styles';
      s.textContent = '@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}';
      document.head.appendChild(s);
    }
    const emojis = ['⭐','🌟','✨','🎉','🎊','💫','🌈','❤️','💜','💛'];
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        el.style.cssText = `position:fixed;left:${Math.random()*100}vw;top:-20px;font-size:${Math.random()*20+16}px;z-index:9998;pointer-events:none;animation:confettiFall ${Math.random()*2+1.5}s ease-in forwards;`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3500);
      }, Math.random()*1000);
    }
  },
};

/* --- POINTS --- */
const Points = {
  getBalance(pid) { return Store.getProfile(pid, 'points-balance', 0); },
  getHistory(pid) { return Store.getProfile(pid, 'points-history', []); },
  add(pid, amount, reason, source = 'manual') {
    const balance = this.getBalance(pid) + amount;
    Store.setProfile(pid, 'points-balance', balance);
    const h = this.getHistory(pid);
    h.unshift({ id:Date.now(), type:'earned', amount, reason, source, balance, date:new Date().toISOString() });
    Store.setProfile(pid, 'points-history', h.slice(0,500));
    return balance;
  },
  spend(pid, amount, reason) {
    const balance = this.getBalance(pid);
    if (balance < amount) return false;
    const nb = balance - amount;
    Store.setProfile(pid, 'points-balance', nb);
    const h = this.getHistory(pid);
    h.unshift({ id:Date.now(), type:'spent', amount, reason, balance:nb, date:new Date().toISOString() });
    Store.setProfile(pid, 'points-history', h.slice(0,500));
    return nb;
  },
};

/* --- CHORES --- */
const Chores = {
  getDefinitions()       { return Store.get('chore-definitions', []); },
  getForProfile(pid)     { return this.getDefinitions().filter(c => c.assignedTo === pid || c.assignedTo === 'both'); },
  getTodayCompletions(pid) {
    return Store.getProfile(pid, `chores-done-${new Date().toDateString()}`, []);
  },
  markDone(pid, choreId) {
    const key  = `chores-done-${new Date().toDateString()}`;
    const done = this.getTodayCompletions(pid);
    if (!done.includes(choreId)) {
      done.push(choreId);
      Store.setProfile(pid, key, done);
      const chore = this.getDefinitions().find(c => c.id === choreId);
      if (chore) Points.add(pid, chore.points || 5, `Chore: ${chore.name}`, 'chore');
      return true;
    }
    return false;
  },
  isDone(pid, choreId) { return this.getTodayCompletions(pid).includes(choreId); },
  saveDefinition(chore) {
    const all = this.getDefinitions();
    const idx = all.findIndex(c => c.id === chore.id);
    if (idx >= 0) all[idx] = chore; else all.push({ ...chore, id: chore.id || `chore-${Date.now()}` });
    Store.set('chore-definitions', all);
  },
  deleteDefinition(choreId) { Store.set('chore-definitions', this.getDefinitions().filter(c => c.id !== choreId)); },
};

      ...this.getTests(pid).filter(x => !x.done && x.date && new Date(x.date).toDateString() === today),
    ];
  },

  getUpcoming(pid, days = 7) {

      tests:    filter(this.getTests(pid),    'date'),
      projects: filter(this.getProjects(pid), 'dueDate'),

/* ============================================================
   REWARD STORE DATA LAYER
============================================================ */
const RewardStore = {
  getRewards()     { return Store.get('reward-store', []); },
  getRedemptions(pid) { return Store.getProfile(pid, 'redemptions', []); },

  saveReward(reward) {
    const all = this.getRewards();
    const idx = all.findIndex(r => r.id === reward.id);
    const item = { ...reward, id: reward.id || `reward-${Date.now()}` };
    if (idx >= 0) all[idx] = item; else all.push(item);
    Store.set('reward-store', all);
    return item;
  },

  deleteReward(id) {
    Store.set('reward-store', this.getRewards().filter(r => r.id !== id));
  },

  requestRedemption(pid, rewardId) {
    const reward  = this.getRewards().find(r => r.id === rewardId);
    if (!reward) return false;
    const balance = Points.getBalance(pid);
    if (balance < reward.cost) return false;

    const redemption = {
      id:       `redeem-${Date.now()}`,
      profileId: pid,
      rewardId,
      rewardName: reward.name,
      cost:     reward.cost,
      status:   'pending',
      requestedAt: new Date().toISOString(),
    };

    // Hold points (deduct immediately, refund if denied)
    Points.spend(pid, reward.cost, `Reward request: ${reward.name}`);

    // Add to pending
    const all = Store.get('reward-redemptions', []);
    all.unshift(redemption);
    Store.set('reward-redemptions', all.slice(0, 200));

    // Alert parents
    const alerts = Store.get('parent-alerts', []);
    alerts.unshift({
      id: Date.now(), profileId: pid,
      type: 'reward-request',
      data: redemption,
      date: new Date().toISOString(),
      read: false,
    });
    Store.set('parent-alerts', alerts.slice(0, 200));

    return redemption;
  },

  approveRedemption(redemptionId) {
    const all = Store.get('reward-redemptions', []);
    const idx = all.findIndex(r => r.id === redemptionId);
    if (idx >= 0) {
      all[idx].status = 'approved';
      all[idx].approvedAt = new Date().toISOString();
      Store.set('reward-redemptions', all);
    }
  },

  denyRedemption(redemptionId) {
    const all = Store.get('reward-redemptions', []);
    const idx = all.findIndex(r => r.id === redemptionId);
    if (idx >= 0) {
      const r = all[idx];
      r.status = 'denied';
      r.deniedAt = new Date().toISOString();
      Store.set('reward-redemptions', all);
      // Refund points
      Points.add(r.profileId, r.cost, `Refund: ${r.rewardName}`, 'refund');
    }
  },

  getPending()  { return Store.get('reward-redemptions', []).filter(r => r.status === 'pending'); },
  getForProfile(pid) { return Store.get('reward-redemptions', []).filter(r => r.profileId === pid); },

  seedDefaults() {
    if (this.getRewards().length === 0) {
      const defaults = [
        { id:'r1', name:'30 min extra screen time', emoji:'📱', cost:20,  category:'screen'   },
        { id:'r2', name:'Choose dinner tonight',     emoji:'🍽️',  cost:30,  category:'food'     },
        { id:'r3', name:'Stay up 15 min late',       emoji:'🌙', cost:25,  category:'bedtime'  },
        { id:'r4', name:'Movie night pick',          emoji:'🎬', cost:50,  category:'activity' },
        { id:'r5', name:'Small treat from store',    emoji:'🍬', cost:40,  category:'treat'    },
        { id:'r6', name:'Skip one chore (once)',     emoji:'🎉', cost:35,  category:'chores'   },
        { id:'r7', name:'Friend sleepover',          emoji:'🏕️',  cost:100, category:'social'   },
        { id:'r8', name:'Game time with a parent',   emoji:'🎮', cost:15,  category:'activity' },
      ];
      defaults.forEach(d => this.saveReward(d));
    }
  },
};

    const d=new Date();d.setDate(d.getDate()-i);const ds=d.toDateString();
    const label=i===0?'Today':d.toLocaleDateString('en-US',{weekday:'short'});
    ['elder','younger'].forEach(pid=>{
      const v=Store.getProfile(pid,`volcano-today-${ds}`,null);
      const max=pid==='elder'?10:5,level=v?.max||0,pct=Math.round(level/max*100);
      const row=document.createElement('div');row.className='chart-row';
      row.innerHTML=`<span class="chart-lbl" style="color:${pid==='elder'?'var(--elder)':'var(--younger)'};">${label} ${Profiles.get(pid)?.displayName?.split(' ')[0]||pid}</span><div class="chart-bg"><div class="chart-fill" style="width:${pct}%;background:${level>=(pid==='elder'?7:3)?'linear-gradient(90deg,#f87171,#e94560)':'linear-gradient(90deg,#34d399,#60a5fa)'}"></div></div><span class="chart-val">${level||'—'}</span>`;
      vc.appendChild(row);
    });
  }

  // Hygiene
  const hc=document.getElementById('hygieneChart');
  ['elder','younger'].forEach(pid=>{
    const mDone=Store.getProfile(pid,`routine-done-morning-${today}`,[]);
    const bDone=Store.getProfile(pid,`routine-done-bedtime-${today}`,[]);
    const mSteps=Store.getProfile(pid,'routine-morning',DEFAULT_ROUTINES.morning).filter(s=>s.hygiene);
    const bSteps=Store.getProfile(pid,'routine-bedtime',DEFAULT_ROUTINES.bedtime).filter(s=>s.hygiene);
    const allH=[...mSteps,...bSteps];const done=[...mDone,...bDone];
    const comp=allH.filter(s=>done.includes(s.id)).length;
    const pct=allH.length?Math.round(comp/allH.length*100):0;
    const row=document.createElement('div');row.className='chart-row';
    row.innerHTML=`<span class="chart-lbl" style="color:${pid==='elder'?'var(--elder)':'var(--younger)'}">${Profiles.get(pid)?.displayName||pid}</span><div class="chart-bg"><div class="chart-fill" style="width:${pct}%"></div></div><span class="chart-val">${pct}%</span>`;
    hc.appendChild(row);
  });
}

/* ══════════════════════════════════════
   PROFILES
══════════════════════════════════════ */
function renderProfiles(){
  const main=document.getElementById('mainPage');
  main.innerHTML=`
    <div class="section">
      <div class="section-title">Profile Editor</div>
      <div class="section-sub">Tap a profile to edit</div>
      <div class="profile-split" id="profileSplit"></div>
    </div>
    <div class="add-form" id="editProfileForm">
      <div class="form-title" id="editProfileTitle">Editing Profile</div>
      <div class="f-row"><div class="f-label">Display name</div><input class="f-input" id="editName" maxlength="20"></div>
      <div class="f-row"><div class="f-label">App name</div><input class="f-input" id="editAppName" placeholder="My HQ" maxlength="20"></div>
      <div class="f-row"><div class="f-label">Mode</div><select class="f-select" id="editMode"><option value="simple">Simple (7yo) — 1-5 scale, picture UI</option><option value="full">Full (10yo) — 1-10 scale, private tools</option></select></div>
      <button class="save-btn" id="saveProfileBtn">Save Changes</button>
    </div>
    <div class="section">
      <div class="section-title">Privacy & Break Glass 🔐</div>
      <div class="section-sub">Truth Checker and Redo Button entries are always private. Break glass requires both parent PINs.</div>
      <button class="save-btn" style="background:rgba(129,140,248,.15);color:#a78bfa;border:2px solid rgba(129,140,248,.3)" id="breakGlassBtn">🔐 Break Glass (Both PINs)</button>
    </div>
  `;

  ['elder','younger'].forEach(pid=>{
    const p=Profiles.get(pid),mascot=MYHQ.MASCOTS.find(m=>m.id===p.mascot)||MYHQ.MASCOTS[0];
    const card=document.createElement('div');card.className=`prof-card ${pid}`;
    card.innerHTML=`<div class="prof-name ${pid}">${mascot.emoji} ${p.displayName||pid}</div><div class="prof-detail">${p.complexity==='full'?'Full mode (10yo)':'Simple mode (7yo)'}</div><div class="prof-detail" style="margin-top:4px">Tap to edit</div>`;
    card.onclick=()=>{
      editingProfileId=pid;
      document.getElementById('editProfileTitle').textContent=`Editing: ${p.displayName||(pid==='elder'?'Older':'Younger')}`;
      document.getElementById('editName').value=p.displayName||'';
      document.getElementById('editAppName').value=p.appName||'My HQ';
      document.getElementById('editMode').value=p.complexity||'simple';
      document.getElementById('editProfileForm').classList.add('open');
      document.getElementById('editProfileForm').scrollIntoView({behavior:'smooth'});
    };
    document.getElementById('profileSplit').appendChild(card);
  });

  document.getElementById('saveProfileBtn').onclick=()=>{
    if(!editingProfileId)return;
    const p=Profiles.get(editingProfileId);
    Profiles.save(editingProfileId,{...p,displayName:document.getElementById('editName').value.trim()||p.displayName,appName:document.getElementById('editAppName').value.trim()||'My HQ',complexity:document.getElementById('editMode').value});
    toast('Profile saved! ✅','success');document.getElementById('editProfileForm').classList.remove('open');renderProfiles();
  };

  document.getElementById('breakGlassBtn').onclick=()=>{
    if(window.requireBothPins){window.requireBothPins('Break Glass Access',()=>toast('Emergency access granted for 5 minutes','success'));}
    else toast('Open from parent dashboard for Break Glass','warn');
  };
}

/* ══════════════════════════════════════
   SETTINGS
══════════════════════════════════════ */
function renderSettings(){
  const main=document.getElementById('mainPage');
  main.innerHTML=`
    <div class="section">
      <div class="section-title">Push Notifications 🔔</div>
      <div id="notifToggles"></div>
      <button class="save-btn" id="saveNotifs">Save Notification Settings</button>
    </div>
    <div class="section">
      <div class="section-title">Before & After Prompts ✨</div>
      <div class="section-sub">Auto-prompt a mood check before/after these activities</div>
      <div id="baToggles"></div>
    </div>
    <div class="section">
      <div class="section-title">Parent PINs 🔐</div>
      <div class="section-sub">Requires both current PINs to change.</div>
      <div class="f-row"><div class="f-label">Current Parent A PIN</div><input type="number" class="f-input" id="curPinA" placeholder="Current PIN" maxlength="4"></div>
      <div class="f-row"><div class="f-label">Current Parent B PIN (if set)</div><input type="number" class="f-input" id="curPinB" placeholder="Leave blank if only one PIN" maxlength="4"></div>
      <div class="f-row"><div class="f-label">New Parent A PIN</div><input type="number" class="f-input" id="newPinA" placeholder="Leave blank to keep" maxlength="4"></div>
      <div class="f-row"><div class="f-label">New Parent B PIN</div><input type="number" class="f-input" id="newPinB" placeholder="Leave blank to keep / remove" maxlength="4"></div>
      <button class="save-btn" id="savePins">Update PINs 🔐</button>
    </div>
  `;

  buildToggles('notifToggles',NOTIF_SETTINGS,'parent-notif-settings');
  buildToggles('baToggles',BA_ACTIVITIES,'parent-ba-settings');

  document.getElementById('saveNotifs').onclick=()=>{
    const vals={};document.getElementById('notifToggles').querySelectorAll('.toggle-sw[data-key]').forEach(sw=>{vals[sw.dataset.key]=sw.classList.contains('on');});
    Store.set('parent-notif-settings',vals);toast('Saved! ✅','success');
  };

  document.getElementById('savePins').onclick=()=>{
    const ca=document.getElementById('curPinA').value;
    if(!Auth.verifyPin('parent-a',ca)){toast('Current PIN A incorrect','error');return;}
    const na=document.getElementById('newPinA').value;
    if(na&&na.length===4)Auth.setPin('parent-a',na);
    const nb=document.getElementById('newPinB').value;
    if(nb&&nb.length===4)Auth.setPin('parent-b',nb);
    toast('PINs updated! 🔐','success');
    ['curPinA','curPinB','newPinA','newPinB'].forEach(id=>document.getElementById(id).value='');
  };
}

function buildToggles(containerId,items,storageKey){
  const saved=Store.get(storageKey,{});const el=document.getElementById(containerId);el.innerHTML='';
  items.forEach(item=>{
    const val=saved[item.key]??(item.default??false);
    const row=document.createElement('div');row.className='toggle-row';
    row.innerHTML=`<div class="toggle-info"><div class="toggle-label">${item.label}</div>${item.sub?`<div class="toggle-sub">${item.sub}</div>`:''}</div><div class="toggle-sw${val?' on':''}" data-key="${item.key}"></div>`;
    row.querySelector('.toggle-sw').onclick=function(){this.classList.toggle('on');const v={};el.querySelectorAll('.toggle-sw[data-key]').forEach(s=>{v[s.dataset.key]=s.classList.contains('on');});Store.set(storageKey,v);};
    el.appendChild(row);
  });
}

/* ── INIT ── */
function init(){
  const session=Auth.getSession();
  if(!session||session.profileId!=='parent'){location.href='parent.html';return;}
  document.querySelectorAll('.ts-tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));
  const hash=(window.location.hash||'#chores').slice(1);
  switchTab(['chores','rewards','routines','monitoring','profiles','settings'].includes(hash)?hash:'chores');
}

document.addEventListener('DOMContentLoaded',()=>{
  try{init();}catch(e){document.body.innerHTML=`<div style="padding:24px;color:#f87171;font-family:monospace;font-size:13px;background:#080c18;min-height:100vh"><h2 style="color:#fbbf24;margin-bottom:16px">Error</h2><pre>${e.stack||e.message}</pre></div>`;}
});
</script>
